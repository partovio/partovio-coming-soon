<title>Partovio — Coming Soon</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%23122046'/%3E%3Cpath d='M20 18h13a11 11 0 0 1 0 22h-6v8h-7z' fill='none' stroke='%23e8a220' stroke-width='6' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root {
    --navy:#122046; --ink:#0c1424; --gold:#e8a220; --brand:#1e56d7; --brand2:#3b6fe6;
    --brand-lite:#eef3ff; --paper:#f6f8fb; --card:#ffffff; --line:#e5e8ef; --mute:#566374;
    --sans:"Space Grotesk","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --arabic:"SF Arabic","Geeza Pro","Noto Kufi Arabic",Tahoma,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    min-height:100vh; font-family:var(--sans); color:var(--ink); background:var(--paper);
    display:grid; place-items:center; overflow:hidden; position:relative;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Blurred faux-homepage backdrop ── */
  .bg { position:fixed; inset:-6%; z-index:0; filter:blur(20px) saturate(1.05); transform:scale(1.1); opacity:0.9; }
  .bg__inner { position:absolute; inset:0; display:flex; flex-direction:column; animation:drift 34s ease-in-out infinite alternate; }
  @keyframes drift { from { transform:translateY(0) } to { transform:translateY(-26px) } }

  .nav { display:flex; align-items:center; gap:18px; padding:22px 6vw; }
  .nav .logo-ghost { width:120px; height:26px; border-radius:7px; background:var(--navy); opacity:0.9; }
  .nav .pill { height:14px; border-radius:8px; background:#c9d2e0; }
  .nav .pill.a{width:70px} .nav .pill.b{width:56px} .nav .pill.c{width:64px} .nav .pill.d{width:48px}
  .nav .spacer{flex:1}
  .nav .cart{width:38px;height:38px;border-radius:50%;background:var(--brand-lite);border:1px solid #d3def8}

  .hero { margin:6px 6vw 0; border-radius:26px; padding:44px 46px;
    background:linear-gradient(120deg,var(--brand) 0%,#1546b6 60%,var(--navy) 100%);
    display:flex; gap:40px; align-items:center; box-shadow:0 30px 60px -40px rgba(18,32,70,.6); }
  .hero__l{flex:1.2; display:flex; flex-direction:column; gap:16px}
  .hero__h{height:30px;border-radius:9px;background:rgba(255,255,255,.92)}
  .hero__h.s{width:82%} .hero__h.t{width:56%;height:22px;background:rgba(255,255,255,.55)}
  .hero__search{margin-top:10px;height:60px;border-radius:15px;background:#fff;display:flex;align-items:center;gap:14px;padding:0 16px}
  .hero__search .mag{width:22px;height:22px;border-radius:50%;border:3px solid #b7c2d6}
  .hero__search .txt{flex:1;height:12px;border-radius:6px;background:#dde4ef}
  .hero__search .go{width:96px;height:40px;border-radius:11px;background:var(--gold)}
  .hero__r{flex:.8;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .hero__r .tile{height:96px;border-radius:16px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22)}

  .cats{display:flex;gap:16px;padding:26px 6vw 0;overflow:hidden}
  .cats .c{flex:1;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .cats .c .ico{width:52px;height:52px;border-radius:14px}
  .cats .c:nth-child(1) .ico{background:#ffe7b8}
  .cats .c:nth-child(2) .ico{background:#d9e4ff}
  .cats .c:nth-child(3) .ico{background:#d5f3e4}
  .cats .c:nth-child(4) .ico{background:#ffe0dd}
  .cats .c:nth-child(5) .ico{background:#e7defb}
  .cats .c:nth-child(6) .ico{background:#d9f0f7}
  .cats .c .lbl{width:64px;height:10px;border-radius:6px;background:#d7deea}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:26px 6vw 40px}
  .grid .p{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .grid .p .img{height:120px;background:linear-gradient(135deg,#eef2f8,#dbe4f2)}
  .grid .p .body{padding:14px;display:flex;flex-direction:column;gap:9px}
  .grid .p .l1{height:12px;width:88%;border-radius:6px;background:#dde4ef}
  .grid .p .l2{height:12px;width:60%;border-radius:6px;background:#e6ebf3}
  .grid .p .price{height:18px;width:44%;border-radius:7px;background:var(--brand);opacity:.85;margin-top:2px}

  /* Scrim to unify + soften (mystery) */
  .scrim { position:fixed; inset:0; z-index:1;
    background:radial-gradient(120% 90% at 50% 40%,rgba(246,248,251,.30) 0%,rgba(246,248,251,.62) 55%,rgba(232,238,248,.86) 100%); }

  /* ── Foreground card ── */
  .card { position:relative; z-index:2; width:min(92vw,460px); text-align:center;
    background:rgba(255,255,255,.82); backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2);
    border:1px solid rgba(255,255,255,.9); border-radius:26px; padding:46px 40px 34px;
    box-shadow:0 40px 90px -50px rgba(12,20,36,.55),0 2px 0 rgba(255,255,255,.6) inset;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  .card .logo { width:196px; height:auto; margin:0 auto 4px; display:block; }
  .eyebrow { font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--brand); font-weight:600; margin:14px 0 0; }
  .card h1 { font-size:40px; line-height:1.04; letter-spacing:-0.02em; margin:12px 0 2px; color:var(--navy); font-weight:700; }
  .card .ar { font-family:var(--arabic); direction:rtl; font-size:26px; font-weight:700; color:var(--gold); margin:2px 0 0; }
  .card p.tag { color:var(--mute); font-size:15px; line-height:1.6; margin:16px auto 0; max-width:34ch; }
  .card p.tag .ar-tag { font-family:var(--arabic); display:block; margin-top:3px; color:#7a828f; font-size:14px; }

  .cta { display:inline-flex; align-items:center; gap:9px; margin-top:24px; text-decoration:none;
    background:var(--navy); color:#fff; font-family:var(--sans); font-weight:600; font-size:14.5px;
    padding:14px 24px; border-radius:13px; transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 16px 30px -18px rgba(18,32,70,.65); }
  .cta:hover { transform:translateY(-1px); box-shadow:0 20px 36px -18px rgba(18,32,70,.7); }
  .cta:focus-visible { outline:3px solid var(--gold); outline-offset:3px; }
  .cta .arrow { transition:transform .15s ease; }
  .cta:hover .arrow { transform:translateX(3px); }

  .meta { margin-top:22px; padding-top:18px; border-top:1px solid rgba(18,32,70,.1);
    display:flex; align-items:center; justify-content:center; gap:14px; font-size:12.5px; color:var(--mute); }
  .meta .dot{width:4px;height:4px;border-radius:50%;background:#c3ccda}
  .meta a{color:var(--navy);text-decoration:none;font-weight:600}
  .meta .flag{filter:saturate(1.1)}

  @media (max-width:520px){
    .card{padding:38px 26px 28px}
    .card h1{font-size:33px}
    .card .logo{width:168px}
  }
  @media (prefers-reduced-motion:reduce){
    .bg__inner{animation:none} .card{animation:none}
  }
</style>
